<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dream77.com में आपका स्वागत है</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Pacifico&display=swap');

body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 20px;
  color: #fff;
  text-align: center;
  position: relative;

  /* PC端背景：渐变 + 本地图片 */
  background: linear-gradient(135deg, rgba(26,26,46,0.7), rgba(22,36,71,0.7)),
              url('images/A.png') no-repeat center center fixed;
  background-size: cover;
  background-attachment: fixed;
}

/* 模糊层，让文字更清晰 */
body::before {
  content: "";
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: inherit;
  filter: blur(5px) brightness(0.75);
  z-index: -1;
}

.container {
  max-width: 500px;
  margin: 20px auto;
  background: rgba(31,64,104,0.85);
  padding: 30px;
  border-radius: 15px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.5);
}

h1 { font-size: 36px; color: #ffcc00; margin-bottom: 20px; line-height: 1.2; }
h1 .brand { font-family: 'Pacifico', cursive; font-size: 42px; display: inline-block; }
h1 .hi-text { font-size: 28px; display: inline-block; }
h2 { font-size: 22px; margin-bottom: 15px; }
h2 .bonus { color: #ff0000; font-weight: bold; font-size: 24px; }
h2 .date { color: #00ffff; font-weight: bold; }

.input-box { display: flex; flex-direction: column; gap: 25px; margin-bottom: 10px; }
.code-box { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; position: relative; }
.square { width: 160px; background: #ff8800; color: #1f4068; padding: 10px; border-radius: 6px; font-weight: bold; text-align: center; font-size: 14px; }
input.code { padding: 10px; font-size: 20px; border: none; border-radius: 6px 0 0 6px; text-align: center; min-width: 150px; letter-spacing: 2px; font-weight: bold; background: #ffffff10; color: #fff; }
button.copy-btn { padding: 5px 10px; font-size: 16px; border: none; background: linear-gradient(135deg,#ffcc00,#e6b800); color: #1f4068; font-weight: bold; cursor: pointer; border-radius: 6px; transition: transform 0.1s, box-shadow 0.1s; white-space: nowrap; }
button.copy-btn:active { transform: translateY(2px); box-shadow: 0 2px 5px rgba(0,0,0,0.3) inset; }
.copy-alert { position: absolute; right: -170px; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.3); padding: 6px 12px; border-radius: 6px; font-weight: 700; color: #00ffcc; display: none; font-size: 14px; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }

/* 手机端背景覆盖 */
@media screen and (max-width: 480px) {
  body {
    background: linear-gradient(135deg, rgba(26,26,46,0.7), rgba(22,36,71,0.7)),
                url('images/A.png') no-repeat center top;
    background-size: cover;
  }
  h1 .brand { display: block; margin-bottom: 5px; }
  h1 .hi-text { display: block; font-size: 24px; }
  .input-box { gap: 20px; }
  .code-box { flex-direction: column; align-items: center; gap: 10px; }
  .square { margin-right: 0; margin-bottom: 5px; }
  input.code, button.copy-btn { border-radius: 6px; width: 90%; }
  button.copy-btn { margin-left: 0; }
  .copy-alert { position: relative; right: auto; top: auto; transform: none; margin-top: 5px; }
}
</style>
</head>
<body>

<div class="container">
  <h1><span class="brand">Dream77.com</span><span class="hi-text">में आपका स्वागत है</span></h1>
  <h2><span class="bonus">Bonus</span> <span class="date">Code for 14/03/2026</span></h2>

  <div class="input-box">
    <div class="code-box">
      <div class="square">आज ₹200+ जमा करें</div>
      <input type="text" value="90BE9E7C" class="code" readonly>
      <button class="copy-btn" onclick="copyCode(this)">COPY</button>
      <span class="copy-alert">कॉपी सफल हुआ</span>
    </div>
    <div class="code-box">
      <div class="square">आज ₹500+ जमा करें</div>
      <input type="text" value="FB10E05D" class="code" readonly>
      <button class="copy-btn" onclick="copyCode(this)">COPY</button>
      <span class="copy-alert">कॉपी सफल हुआ</span>
    </div>
    <div class="code-box">
      <div class="square">आज ₹1,000+ जमा करें</div>
      <input type="text" value="B8AC116A" class="code" readonly>
      <button class="copy-btn" onclick="copyCode(this)">COPY</button>
      <span class="copy-alert">कॉपी सफल हुआ</span>
    </div>
    <div class="code-box">
      <div class="square">आज ₹5,000+ जमा करें</div>
      <input type="text" value="134FD624" class="code" readonly>
      <button class="copy-btn" onclick="copyCode(this)">COPY</button>
      <span class="copy-alert">कॉपी सफल हुआ</span>
    </div>
    <div class="code-box">
      <div class="square">आज ₹10,000+ जमा करें</div>
      <input type="text" value="59AA654C" class="code" readonly>
      <button class="copy-btn" onclick="copyCode(this)">COPY</button>
      <span class="copy-alert">कॉपी सफल हुआ</span>
    </div>
    <div class="code-box">
      <div class="square">आज ₹50,000+ जमा करें</div>
      <input type="text" value="E51A9E6A" class="code" readonly>
      <button class="copy-btn" onclick="copyCode(this)">COPY</button>
      <span class="copy-alert">कॉपी सफल हुआ</span>
    </div>
  </div>
</div>

<script>
function copyCode(btn) {
  var input = btn.previousElementSibling;
  navigator.clipboard.writeText(input.value).then(() => {
    var alertBox = btn.nextElementSibling;
    alertBox.style.display = 'inline-block';
    setTimeout(() => { alertBox.style.display = 'none'; }, 2000);
  }).catch(err => {
    console.error('复制失败', err);
  });
}
</script>

</body>
</html>
